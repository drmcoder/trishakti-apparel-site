name: Build & deploy to cPanel (FTP)

# Push to the default branch → build the static site → FTP-sync to the server.
on:
  push:
    branches: [main, master]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci || npm install

      - name: Build static site
        # For a ROOT-domain deploy leave NEXT_BASE_PATH unset.
        # For a /subfolder preview, set NEXT_BASE_PATH and NEXT_PUBLIC_BASE_PATH (e.g. /claude).
        env:
          NEXT_BASE_PATH: ${{ vars.NEXT_BASE_PATH }}
          NEXT_PUBLIC_BASE_PATH: ${{ vars.NEXT_BASE_PATH }}
          NEXT_PUBLIC_FORM_ENDPOINT: ${{ secrets.NEXT_PUBLIC_FORM_ENDPOINT }}
        run: npm run build

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          local-dir: ./out/
          # Trailing slash required. Set FTP_SERVER_DIR secret to the docroot,
          # e.g. "./" for an un-jailed account, or a subfolder.
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          # Keep server-only files (e.g. cPanel dotfiles) from being wiped.
          exclude: |
            **/.git*
            **/.ftpquota
            **/cgi-bin/**
